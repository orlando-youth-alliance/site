media: src/assets/img

content:
  - name: pages
    label: Pages
    type: collection
    path: src/content
    fields:
      - name: title
        label: Title
        type: string
      - name: permalink
        label: Permalink
        type: string
      - name: layout
        label: Layout
        type: select
        options:
          values:
            - layouts/landing.njk
            - layouts/contentHeavy.njk
            - layouts/grid.njk
      - name: featuredImage
        label: Featured Image
        type: image
      - name: body
        label: Body
        type: rich-text
