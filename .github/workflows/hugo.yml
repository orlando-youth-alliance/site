name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Build
        run: cd site && hugo --minify --ignoreCache

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Stamp last_deployed_at on all pages
        env:
          PB_URL: https://oya-cms.fly.dev
          PB_TOKEN: ${{ secrets.POCKETBASE_TOKEN }}
        run: |
          ids=$(curl -sf -H "Authorization: $PB_TOKEN" \
            "$PB_URL/api/collections/pages/records?perPage=500&fields=id" \
            | jq -r '.items[].id')
          now=$(date -u +"%Y-%m-%d %H:%M:%SZ")
          for id in $ids; do
            curl -sf -X PATCH \
              -H "Authorization: $PB_TOKEN" \
              -H "Content-Type: application/json" \
              -H "X-Deploy-Stamp: 1" \
              -d "{\"last_deployed_at\": \"$now\"}" \
              "$PB_URL/api/collections/pages/records/$id"
          done
